body:
  text: 西天譯經三藏朝奉大夫試鴻臚卿傳法大師臣施護奉詔譯如是我聞一時佛在釋種住處迦毗羅城尼拘陀樹園與苾芻衆俱爾時有一苾芻尼名摩訶波闍波提持新㲲衣來詣佛所到佛所已頂禮佛足退住一面即白佛言世尊此新㲲衣我自手作奉上世尊惟願納受令我長夜得大利樂爾時佛告摩訶波闍波提汝可持此㲲衣施諸大衆所獲勝利同供養我等無有異是時摩訶波闍波提苾芻尼重白佛言我本發心唯為世尊故造此衣願佛納受令我長夜得大利樂如是三復殷勤勸請佛亦如是三復答言但當平等施諸大衆所獲勝利與我無異是時尊者阿難侍於佛側見是事已前白佛言世尊此摩訶波闍波提苾芻尼是佛之親有大恩德唯佛自知此所奉衣佛為納受今正是時令摩訶波闍波提於長夜中得大利樂佛言阿難如是如是此摩訶波闍波提是吾之親有大恩德我亦自知今自手造衣來施於我甚為難事何以故阿難當知所有補特伽羅能起淨信心歸依佛法僧者甚為難事又復能持不殺不盜不淫不妄不飲酒等近事戒法如是補特伽羅轉復難作何況於佛世尊合掌恭敬而行布施施已淨信於佛無疑及法僧伽亦無疑惑乃至苦集滅道四聖諦理永斷疑見阿難今此摩訶波闍波提苾芻尼能起淨信心歸依佛法僧受持不殺不盜不淫不妄不飲酒等近事戒法而能於佛及法僧伽乃至苦集滅道四聖諦理已斷疑惑此苾芻尼難作能作佛亦自知阿難有十四種較量布施何等十四一者於病苦人而行布施二者於破戒人而行布施三者於持戒人而行布施四者於離染人而行布施五者於須陀洹向而行布施六者於須陀洹果而行布施七者於斯陀含向而行布施八者於斯陀含果而行布施九者於阿那含向而行布施十者於阿那含果而行布施十一者於阿羅漢向而行布施十二者於阿羅漢果而行布施十三者於諸緣覺而行布施十四者於如來應供正等正覺而行布施阿難汝今當知施病苦人獲二倍福施破戒人獲百倍福施持戒人獲千倍福施離染人獲百千倍福施須陀洹向獲無量福何況須陀洹果施斯陀含向獲無量福何況斯陀含果施阿那含向獲無量福何況阿那含果施阿羅漢向獲無量福何況阿羅漢果施諸緣覺獲無量福何況如來應供正等正覺如是名為較量十四種布施功德復次阿難當知布施大衆有其七種一者施佛現前諸苾芻衆二者施佛滅後諸苾芻衆三者施佛滅後苾芻尼衆四者施佛滅後苾芻苾芻尼二衆五者施佛滅後遊方行化諸苾芻衆六者施佛滅後遊方行化苾芻尼衆七者施佛滅後遊方行化苾芻苾芻尼二衆如是名為七種大衆當行布施復次阿難當知有四種布施清淨何等為四一者能施清淨即無受者二者所施清淨即無受者三者能受清淨即無施者四者所受清淨即無施者阿難何名能施清淨即無受者謂由施者不取其相即身業清淨口業清淨意業清淨正命清淨見亦清淨如是具足即無施相以無施故即無受者若施者有所見相即身口意三業不清淨命亦不清淨見亦不清淨若離是相即施者受者二皆清淨又復何名所施清淨即無受者若受者身業不清淨口業不清淨意業不清淨命不清淨見不清淨即有所施相若受者三業清淨命清淨見清淨如是具足即無所施相由離相故即所施清淨又復何名能受清淨即無施者若受者身口意三業不清淨命不清淨見不清淨即有能受相若離是相即無施者又復何名所受清淨即無施者謂由施者三業清淨命清淨見清淨即無所施由離施故即無所受是故所受清淨阿難若能如是了知即得四種布施清淨爾時摩訶波闍波提苾芻尼聞佛宣説種種布施法已即持是衣施諸大衆是時諸苾芻衆即為納受佛告阿難於當來世若有信心善男子等能於大衆起淨信心而行布施者當知是人獲福無量何況於今現在行施爾時尊者阿難及摩訶波闍波提苾芻尼聞佛説已歡喜踊躍信受奉行
